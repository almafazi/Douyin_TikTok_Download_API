version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: tiktok_gateway_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-gateway-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tiktok_shared_network

  douyin_tiktok_download_api:
    build: .
    container_name: douyin_tiktok_download_api
    restart: always
    ports:
      - "3035:8000"
    volumes:
      - ./douyin_tiktok_download_api/douyin_web/config.yaml:/app/crawlers/douyin/web/config.yaml
      - ./douyin_tiktok_download_api/tiktok_web/config.yaml:/app/crawlers/tiktok/web/config.yaml
      - ./douyin_tiktok_download_api/tiktok_app/config.yaml:/app/crawlers/tiktok/app/config.yaml
    environment:
      TZ: Asia/Jakarta
      PUID: 1026
      PGID: 100
    privileged: true
    networks:
      - tiktok_shared_network

  tiktok_gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: tiktok_gateway
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7789:7789"
    volumes:
      - ./douyin_tiktok_download_api/douyin_web/config.yaml:/app/crawlers/douyin/web/config.yaml:ro
      - ./douyin_tiktok_download_api/tiktok_web/config.yaml:/app/crawlers/tiktok/web/config.yaml:ro
      - ./douyin_tiktok_download_api/tiktok_app/config.yaml:/app/crawlers/tiktok/app/config.yaml:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      TZ: Asia/Jakarta
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "7789"
      CONFIG_PATH: /app/config.yaml
      REDIS_URL: redis://redis:6379/0
      TIKTOK_EXTRACT_CACHE_TTL_SECONDS: "1800"
      TIKTOK_API_KEY: ${TIKTOK_API_KEY:-}
      ENVIRONMENT: production
      GUNICORN_WORKERS: "4"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7789/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    privileged: true
    networks:
      - tiktok_shared_network

networks:
  tiktok_shared_network:
    name: tiktok_shared_network

volumes:
  redis-gateway-data:
